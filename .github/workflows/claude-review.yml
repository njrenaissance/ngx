name: Claude Code Review

# Runs Claude Code against the PR diff and posts a single consolidated review
# comment. Triggered automatically on every PR against main, and manually via
# workflow_dispatch for ad-hoc reviews on any branch.
#
# Model selection (cheapest → most capable):
#   - claude-haiku-4-5-20251001 — fastest, cheapest; good for nits + obvious bugs
#   - claude-sonnet-4-6         — balanced; recommended default for routine PRs
#   - claude-opus-4-7           — deepest reasoning; reserve for big/risky PRs
#
# Resolution order for the model:
#   1. workflow_dispatch input (manual override)
#   2. repo variable CLAUDE_REVIEW_MODEL  (set under Settings → Variables)
#   3. hardcoded fallback below
#
# Required repo secret: ANTHROPIC_API_KEY
#
# How the comment gets posted:
#   The action runs in agent mode (because we pass `prompt:`), and in agent
#   mode `use_sticky_comment` is silently ignored — Claude's output goes to
#   the Actions step summary, not the PR. So the next step pulls the result
#   from `steps.claude-review.outputs.result` and posts it via `gh pr comment`,
#   updating the existing sticky comment if one exists (matched by the
#   "_Generated by Claude Code" sign-off line in the prompt).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:
    inputs:
      model:
        description: 'Claude model to use for this run (overrides CLAUDE_REVIEW_MODEL).'
        required: false
        type: choice
        default: ''
        options:
          - ''
          - claude-haiku-4-5-20251001
          - claude-sonnet-4-6
          - claude-opus-4-7
      pr_number:
        description: 'PR number to review (workflow_dispatch only).'
        required: false
        type: string

permissions:
  contents: read
  pull-requests: write
  # `issues: write` is required for `gh pr comment` even though PRs are PRs —
  # the underlying API endpoint is /repos/.../issues/{n}/comments because PRs
  # are issues at the API layer. Without this, the post step silently 403s.
  issues: write
  id-token: write

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest

    steps:
      - name: Resolve model
        id: model
        env:
          INPUT_MODEL: ${{ inputs.model }}
          VAR_MODEL: ${{ vars.CLAUDE_REVIEW_MODEL }}
        run: |
          # Precedence: workflow_dispatch input → repo variable → fallback.
          # Fallback is Haiku while we shake out the review workflow — keeps
          # spend low on every PR until the prompt + harness are reliable.
          # Bump to claude-sonnet-4-6 once the workflow is stable.
          MODEL="${INPUT_MODEL:-${VAR_MODEL:-claude-haiku-4-5-20251001}}"
          echo "model=${MODEL}" >> "$GITHUB_OUTPUT"
          echo "Using model: ${MODEL}"

      # Resolve which commit SHA to check out. On a `pull_request` trigger
      # the SHA comes from the event payload. On `workflow_dispatch` the
      # event payload has no PR data, so look the SHA up via `gh pr view`
      # using the `pr_number` input. Without this, manual runs check out
      # the workflow's default ref (e.g. main) and Claude diffs against
      # nothing meaningful.
      - name: Resolve PR ref
        id: pr-ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ inputs.pr_number }}
        run: |
          if [[ -n "$PR_NUMBER" ]]; then
            SHA=$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid -q .headRefOid)
            echo "Resolved PR #$PR_NUMBER head SHA: $SHA"
            echo "ref=$SHA" >> "$GITHUB_OUTPUT"
            echo "pr_number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          else
            EVENT_SHA="${{ github.event.pull_request.head.sha }}"
            EVENT_PR="${{ github.event.pull_request.number }}"
            echo "Using event payload head SHA: $EVENT_SHA"
            echo "ref=$EVENT_SHA" >> "$GITHUB_OUTPUT"
            echo "pr_number=$EVENT_PR" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Claude needs full history to diff against the PR base.
          fetch-depth: 0
          ref: ${{ steps.pr-ref.outputs.ref }}

      - name: Run Claude Code review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # v1 dropped top-level `model` / `max_turns`; pass them via claude_args.
          claude_args: --model ${{ steps.model.outputs.model }} --max-turns 25
          # Print Claude's full transcript (tool calls + reasoning) to the
          # action's step log — useful for debugging review behavior. Does
          # not affect what gets posted as the sticky PR comment.
          show_full_output: true
          # NOTE: `use_sticky_comment: true` is intentionally NOT set. With a
          # `prompt:` provided, the action runs in agent mode and that input
          # is silently ignored. We post the comment ourselves in the next
          # step so we can actually control sticky behavior + handle multi-line
          # markdown reliably via --body-file.
          prompt: |
            You are reviewing a pull request against the standards in CLAUDE.md
            at the repo root. Read it before commenting — it defines the
            engineering working agreement (SemVer rules, diagram-sync rule,
            fix-forward migrations, commit conventions, pre-commit hooks).

            Do NOT try to post a PR comment yourself (no `gh pr comment`, no
            inline-comment tools). The action posts your FINAL assistant
            message as a sticky PR comment. Your final message must BE the
            review body — Markdown only, no preamble like "Here is the
            review:".

            Scope: run `git diff origin/main...HEAD` first. Limit your review
            to lines that appear in that diff. Read unchanged files only when
            needed to understand what a changed line affects.

            Produce ONE consolidated review with these sections, in this order:

            ## Critical
            ## Major
            ## Minor
            ## Good Patterns

            Rules:
            - Use file:line markdown links like [path/to/file.py:42](path/to/file.py#L42)
              so reviewers can click straight to the code.
            - Skip anything ruff, mypy, or pytest already catches in CI — that's
              noise.
            - Don't restate the diff; explain the *why* of each finding and the
              fix when it isn't obvious.
            - Call out missing version bumps in pyproject.toml if src/forge/**
              changed (per CLAUDE.md).
            - If infrastructure/**/*.tf added, removed, or restructured resources,
              note in Minor (at most) whether the diagrams in docs/diagrams/
              appear to be in sync — but treat this as best-effort; diagram
              drift is hard to detect statically.
            - End with one line: "**Recommended pre-merge fixes**: …" naming
              the Critical/Major items the author should resolve before merge.
            - Sign off the comment with: "_Generated by Claude Code (`model`)._"
              where `model` is the model id you were invoked with.

      # Post (or update) the sticky PR comment ourselves. The action ran in
      # agent mode (because we passed `prompt:`), so its `use_sticky_comment`
      # input is silently ignored — Claude's final message is exposed as
      # `outputs.result`. We post via gh, matching the existing sticky comment
      # by the "_Generated by Claude Code" sign-off line.
      - name: Post review as sticky PR comment
        if: always() && steps.claude-review.outputs.result != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr-ref.outputs.pr_number }}
          RESULT: ${{ steps.claude-review.outputs.result }}
        run: |
          set -euo pipefail

          # Write Claude's output to a file so we can pass it via --body-file
          # (handles multi-line markdown / backticks / dollar signs reliably,
          # unlike --body "$RESULT" which can be mangled by the shell).
          printf '%s' "$RESULT" > /tmp/claude-review.md

          # Find existing Claude sticky comment by the sign-off marker the
          # prompt instructs Claude to include. If found → PATCH it. Else →
          # POST a new one.
          MARKER="_Generated by Claude Code"
          EXISTING_ID=$(gh api \
            "repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments" \
            --jq "map(select(.body | contains(\"$MARKER\"))) | .[0].id // empty")

          if [[ -n "$EXISTING_ID" ]]; then
            echo "Updating existing sticky comment id=$EXISTING_ID"
            gh api -X PATCH \
              "repos/$GITHUB_REPOSITORY/issues/comments/$EXISTING_ID" \
              -F body=@/tmp/claude-review.md
          else
            echo "Posting new sticky comment"
            gh pr comment "$PR_NUMBER" \
              --repo "$GITHUB_REPOSITORY" \
              --body-file /tmp/claude-review.md
          fi
