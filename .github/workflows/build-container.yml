name: Build Container

# Build the Forge image and push to Amazon ECR. ECS Fargate pulls from ECR,
# so this is the only published target. Triggers on push to main and on
# manual workflow_dispatch.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch, tag, or commit SHA to build (default: main)'
        required: false
        default: 'main'
        type: string
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.claude/**'
      - 'infrastructure/**'

permissions:
  contents: read
  # ID token used by aws-actions/configure-aws-credentials to assume the
  # AWS deploy role via GitHub OIDC.
  id-token: write

jobs:
  build:
    name: Build & Push Container
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract version from pyproject.toml
        id: version
        run: |
          VERSION=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ -z "$VERSION" ]; then echo "ERROR: Could not extract version from pyproject.toml"; exit 1; fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ecr-login.outputs.registry }}/${{ vars.ECR_REPOSITORY }}
          # Tag scheme:
          #   :latest     — main pushes only (overwrites)
          #   :<version>  — main pushes only (from pyproject.toml)
          #   :sha-<sha>  — always (immutable per-commit ref; `sha-` prefix
          #                 matches the ECR lifecycle policy's pruning rule)
          #   :main       — convenience tag for the latest main build
          #   :pr-<N>     — emitted on pull_request events (no-op until a
          #                 pull_request trigger is added; `pr-` prefix
          #                 matches the ECR lifecycle policy's pruning rule)
          # Non-main branch tags are intentionally NOT emitted: a manual
          # workflow_dispatch from a feature branch would otherwise push an
          # un-prunable `:<branch-name>` tag (no lifecycle rule matches it).
          # Commits on feature branches remain addressable via `:sha-<sha>`.
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=sha-
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=pr,prefix=pr-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
