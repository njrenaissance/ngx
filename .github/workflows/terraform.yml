name: Terraform

# CI for infrastructure/dev/ only. The bootstrap stack
# (infrastructure/bootstrap/) is run ONCE manually by a human and is NEVER
# touched by this workflow — see infrastructure/bootstrap/README.md.
#
# Flow:
#   - On PR: fmt + validate + plan; post the plan summary as a PR comment.
#   - On push to main: fmt + validate + plan, then apply (gated by the
#     `production` GitHub Environment so apply waits for a human reviewer).
#
# Credentials: GitHub OIDC. Each job assumes the IAM role at
# `vars.AWS_DEPLOY_ROLE_ARN` via `aws-actions/configure-aws-credentials`.
# The OIDC provider and role were created out-of-band in AWS — see issue #18
# for the cutover from the previous static-key (`ngx-deployer` IAM user) auth.
# `TF_VAR_aws_profile=""` overrides the variable's default of "ngx-deployer"
# so the AWS provider falls back to the env-var credentials the action exports.

on:
  pull_request:
    branches: [main]
    paths:
      - 'infrastructure/dev/**'
      - 'infrastructure/modules/**'
      - '.github/workflows/terraform.yml'
  push:
    branches: [main]
    paths:
      - 'infrastructure/dev/**'
      - 'infrastructure/modules/**'
      - '.github/workflows/terraform.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: '1.10.0'
  TF_VAR_aws_profile: ''
  WORKING_DIRECTORY: infrastructure/dev

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      app_image: ${{ steps.image.outputs.app_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve app_image
        id: image
        run: |
          # Use the :latest tag from ECR. Image content is owned by the
          # build-container workflow; deploy.yml triggers a rolling redeploy
          # whenever a new :latest is pushed.
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          REGISTRY="${ACCOUNT}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com"
          echo "app_image=${REGISTRY}/${{ vars.ECR_REPOSITORY }}:latest" >> "$GITHUB_OUTPUT"

      - name: terraform fmt -check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: terraform init
        run: terraform init -input=false
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: terraform validate
        run: terraform validate -no-color
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Set up tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.54.0
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache tflint plugins
        uses: actions/cache@v4
        with:
          path: ~/.tflint.d/plugins
          key: tflint-${{ runner.os }}-${{ hashFiles('infrastructure/.tflint.hcl') }}

      - name: tflint init
        run: tflint --init --config .tflint.hcl
        working-directory: infrastructure

      - name: tflint
        # Scan dev/ and modules/*/ explicitly; bootstrap/ is manual-only and excluded from CI
        run: |
          for dir in dev modules/*/; do
            echo "==> tflint: $dir"
            tflint --chdir "$dir" --config "$(pwd)/.tflint.hcl"
          done
        working-directory: infrastructure

      - name: checkov
        # Pinned to v12 SHA; update by running: gh api repos/bridgecrewio/checkov-action/git/ref/tags/v12 --jq '.object.sha'
        # soft_fail=true baselines existing findings — see issue #48 for remediation backlog
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898
        with:
          directory: infrastructure/
          framework: terraform
          quiet: true
          soft_fail: true
          output_format: cli

      # Module-level contract tests. Run in plan mode against the offline-safe
      # AWS provider config in the test file (no AWS API calls). One entry
      # per module that ships a tests/ directory — extend as new modules add
      # their own test files.
      - name: terraform test — ecr module
        run: |
          terraform init -input=false -backend=false
          terraform test -no-color
        working-directory: infrastructure/modules/ecr

      - name: terraform test — kms module
        run: |
          terraform init -input=false -backend=false
          terraform test -no-color
        working-directory: infrastructure/modules/kms

      - name: terraform test — cache module
        run: |
          terraform init -input=false -backend=false
          terraform test -no-color
        working-directory: infrastructure/modules/cache

      - name: terraform plan
        id: tfplan
        env:
          TF_VAR_app_image: ${{ steps.image.outputs.app_image }}
          # Bootstrap outputs flow in via repo variables (Repo Settings →
          # Secrets and variables → Actions → Variables). Set them once from
          # `terraform -chdir=infrastructure/bootstrap output` after the
          # bootstrap stack is applied; CI cannot derive them from the
          # bootstrap state by design (bootstrap state stays local).
          TF_VAR_managed_resources_bucket: ${{ vars.MANAGED_RESOURCES_BUCKET }}
          TF_VAR_managed_resources_region: ${{ vars.MANAGED_RESOURCES_REGION }}
          TF_VAR_managed_resources_kms_key_arn: ${{ vars.MANAGED_RESOURCES_KMS_KEY_ARN }}
        run: |
          set -o pipefail
          terraform plan -input=false -no-color -out=tfplan | tee plan.txt
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIRECTORY }}/tfplan
          retention-days: 7

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const planPath = path.join('${{ env.WORKING_DIRECTORY }}', 'plan.txt');
            let plan = fs.readFileSync(planPath, 'utf8');

            // GitHub comments cap around 65k chars; truncate liberally to fit.
            const MAX = 60000;
            if (plan.length > MAX) {
              plan = plan.slice(0, MAX) + '\n\n... (plan truncated; download the tfplan artifact for the full output)';
            }

            const body = [
              '### 🌍 Terraform Plan (infrastructure/dev)',
              '',
              '<details><summary>Click to expand the plan</summary>',
              '',
              '```diff',
              plan,
              '```',
              '',
              '</details>',
              '',
              `*Plan generated against \`app_image=${{ steps.image.outputs.app_image }}\`. Apply is gated by the \`production\` environment on merge to main.*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const previous = comments.find(c => c.user.type === 'Bot' && c.body.startsWith('### 🌍 Terraform Plan'));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    # Requires a human reviewer per the GitHub Environment "production"
    # configuration. Configure under Repo Settings → Environments.
    environment: production
    env:
      TF_VAR_app_image: ${{ needs.plan.outputs.app_image }}
      # Same repo-variable mapping as the plan job — required because the
      # apply job re-renders the plan and validates required variables
      # before consuming the saved tfplan artifact.
      TF_VAR_managed_resources_bucket: ${{ vars.MANAGED_RESOURCES_BUCKET }}
      TF_VAR_managed_resources_region: ${{ vars.MANAGED_RESOURCES_REGION }}
      TF_VAR_managed_resources_kms_key_arn: ${{ vars.MANAGED_RESOURCES_KMS_KEY_ARN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: ${{ env.WORKING_DIRECTORY }}

      - name: terraform init
        run: terraform init -input=false
        working-directory: ${{ env.WORKING_DIRECTORY }}

      - name: terraform apply
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: ${{ env.WORKING_DIRECTORY }}
