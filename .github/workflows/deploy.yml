name: Deploy ECS Service

# Triggers a rolling redeploy of the Forge ECS service whenever a fresh
# image is pushed to ECR (i.e. after `build-container.yml` succeeds on main).
#
# Why this exists:
#   - Terraform manages the task definition with a stable `:latest` image
#     reference. When CI pushes a new image to that tag, the running tasks
#     don't automatically pull it — ECS only checks at task-launch time.
#   - `aws ecs update-service --force-new-deployment` forces ECS to launch
#     new tasks (which pull the latest image) and drain the old ones via
#     the configured deployment policy.
#
# This workflow runs AFTER build-container.yml completes successfully on
# main. It does NOT run on PR pushes (only post-merge).

on:
  workflow_run:
    workflows: ['Build Container']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Force-new-deployment
    runs-on: ubuntu-latest
    # Skip if the upstream Build Container run failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Trigger ECS rolling deploy
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --force-new-deployment \
            --no-cli-pager \
            --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount,rolloutState:rolloutState}' \
            --output table

      - name: Wait for deployment rollout (max 10 min)
        run: |
          CLUSTER="${{ vars.ECS_CLUSTER }}"
          SERVICE="${{ vars.ECS_SERVICE }}"
          TIMEOUT=600
          INTERVAL=15
          ELAPSED=0

          echo "Polling for rolloutState=COMPLETED on primary deployment..."
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            STATE=$(aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "$SERVICE" \
              --no-cli-pager \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState | [0]' \
              --output text)
            echo "  [${ELAPSED}s] rolloutState=${STATE}"
            if [ "$STATE" = "COMPLETED" ]; then
              echo "Deployment completed successfully."
              exit 0
            fi
            if [ "$STATE" = "FAILED" ]; then
              echo "Deployment rollout FAILED."
              exit 1
            fi
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timed out after ${TIMEOUT}s waiting for rolloutState=COMPLETED."
          exit 1
        timeout-minutes: 12
