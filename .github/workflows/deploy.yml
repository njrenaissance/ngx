name: Deploy ECS Service

# Triggers a rolling redeploy of the Forge ECS service after migrations complete.
#
# Pipeline order on merge to main:
#   build-container.yml  →  migrate.yml  →  deploy.yml
#
# Why migrations run first:
#   The new image may depend on schema changes that the current running tasks
#   don't have yet. Running `alembic upgrade head` before the rolling deploy
#   ensures the DB is at the correct revision before any new task starts.
#
# This workflow runs AFTER migrate.yml completes successfully on main.
# It does NOT run on PR pushes (only post-merge).

on:
  workflow_run:
    workflows: ['Run DB Migrations']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Force-new-deployment
    runs-on: ubuntu-latest
    # Skip if the upstream Run DB Migrations run failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Trigger ECS rolling deploy
        run: |
          aws ecs update-service \
            --cluster "${{ vars.ECS_CLUSTER }}" \
            --service "${{ vars.ECS_SERVICE }}" \
            --force-new-deployment \
            --no-cli-pager \
            --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount,rolloutState:rolloutState}' \
            --output table

      - name: Wait for deployment rollout (max 10 min)
        run: |
          CLUSTER="${{ vars.ECS_CLUSTER }}"
          SERVICE="${{ vars.ECS_SERVICE }}"
          TIMEOUT=600
          INTERVAL=15
          ELAPSED=0

          echo "Polling for rolloutState=COMPLETED on primary deployment..."
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            STATE=$(aws ecs describe-services \
              --cluster "$CLUSTER" \
              --services "$SERVICE" \
              --no-cli-pager \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState | [0]' \
              --output text)
            echo "  [${ELAPSED}s] rolloutState=${STATE}"
            if [ -z "$STATE" ] || [ "$STATE" = "None" ]; then
              echo "No PRIMARY deployment found on $CLUSTER/$SERVICE — aborting."
              exit 1
            fi
            if [ "$STATE" = "COMPLETED" ]; then
              echo "Deployment completed successfully."
              exit 0
            fi
            if [ "$STATE" = "FAILED" ]; then
              echo "Deployment rollout FAILED."
              exit 1
            fi
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "Timed out after ${TIMEOUT}s waiting for rolloutState=COMPLETED."
          exit 1
        timeout-minutes: 12
