name: Deploy ECS Service

# Triggers a rolling redeploy of the Forge API and worker ECS services after
# migrations complete.
#
# Pipeline order on merge to main:
#   build-container.yml  →  migrate.yml  →  deploy.yml
#
# Why migrations run first:
#   The new image may depend on schema changes that the current running tasks
#   don't have yet. Running `alembic upgrade head` before the rolling deploy
#   ensures the DB is at the correct revision before any new task starts.
#
# This workflow runs AFTER migrate.yml completes successfully on main.
# It does NOT run on PR pushes (only post-merge).

on:
  workflow_run:
    workflows: ['Run DB Migrations']
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Force-new-deployment
    runs-on: ubuntu-latest
    # Requires a human reviewer per the GitHub Environment "production"
    # configuration. Configure under Repo Settings → Environments.
    environment: production
    # Skip if the upstream Run DB Migrations run failed.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Trigger ECS rolling deploy
        run: |
          # The API and worker share one image; roll both so the worker does
          # not drift behind on code/schema changes. The worker service name
          # is always "<api-service>-worker" (see infrastructure Terraform).
          for SERVICE in "${{ vars.ECS_SERVICE }}" "${{ vars.ECS_SERVICE }}-worker"; do
            echo "Forcing new deployment for ${SERVICE}..."
            aws ecs update-service \
              --cluster "${{ vars.ECS_CLUSTER }}" \
              --service "$SERVICE" \
              --force-new-deployment \
              --no-cli-pager \
              --query 'service.deployments[0].{status:status,desired:desiredCount,running:runningCount,rolloutState:rolloutState}' \
              --output table
          done

      - name: Wait for deployment rollout (max 10 min per service)
        run: |
          CLUSTER="${{ vars.ECS_CLUSTER }}"
          TIMEOUT=600
          INTERVAL=15

          # Poll one service until its PRIMARY deployment reports COMPLETED.
          wait_for_rollout() {
            local service="$1"
            local elapsed=0
            echo "Polling ${service} for rolloutState=COMPLETED on primary deployment..."
            while [ "$elapsed" -lt "$TIMEOUT" ]; do
              STATE=$(aws ecs describe-services \
                --cluster "$CLUSTER" \
                --services "$service" \
                --no-cli-pager \
                --query 'services[0].deployments[?status==`PRIMARY`].rolloutState | [0]' \
                --output text)
              echo "  [${service}] [${elapsed}s] rolloutState=${STATE}"
              if [ -z "$STATE" ] || [ "$STATE" = "None" ]; then
                echo "No PRIMARY deployment found on $CLUSTER/$service — aborting."
                return 1
              fi
              if [ "$STATE" = "COMPLETED" ]; then
                echo "Deployment of ${service} completed successfully."
                return 0
              fi
              if [ "$STATE" = "FAILED" ]; then
                echo "Deployment rollout of ${service} FAILED."
                return 1
              fi
              sleep "$INTERVAL"
              elapsed=$((elapsed + INTERVAL))
            done
            echo "Timed out after ${TIMEOUT}s waiting for ${service} rolloutState=COMPLETED."
            return 1
          }

          wait_for_rollout "${{ vars.ECS_SERVICE }}"
          wait_for_rollout "${{ vars.ECS_SERVICE }}-worker"
        timeout-minutes: 24
