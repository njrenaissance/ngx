services:
  postgres:
    image: postgres:16
    container_name: forge-postgres
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: forge:local
    container_name: forge-api
    ports:
      # Host:container — both default to 8000. Override with FORGE_PORT in
      # a top-level .env (read by compose) to expose a different port.
      - "${FORGE_PORT:-8000}:${FORGE_PORT:-8000}"
    environment:
      FORGE_APP_NAME: ${FORGE_APP_NAME:-Forge}
      FORGE_ENVIRONMENT: ${FORGE_ENVIRONMENT:-dev}
      FORGE_LOG_LEVEL: ${FORGE_LOG_LEVEL:-INFO}
      FORGE_HOST: ${FORGE_HOST:-0.0.0.0}
      FORGE_PORT: ${FORGE_PORT:-8000}
      FORGE_RELOAD: ${FORGE_RELOAD:-true}
      FORGE_DATABASE__HOST: postgres
      FORGE_DATABASE__PORT: 5432
      FORGE_DATABASE__NAME: forge
      FORGE_DATABASE__USER: forge
      FORGE_DATABASE__PASSWORD: forge
      FORGE_DATABASE__SSL_MODE: disable
    volumes:
      - ./src:/app/src:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen('http://localhost:' + os.environ.get('FORGE_PORT', '8000') + '/livez').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
