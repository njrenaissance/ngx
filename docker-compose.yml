services:
  postgres:
    image: postgres:16
    container_name: forge-postgres
    environment:
      POSTGRES_DB: forge
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    # Local-only broker for Celery. Production uses AWS Elasticache for Redis;
    # both targets are reached via FORGE_CELERY__BROKER_URL / RESULT_BACKEND.
    image: redis:7-alpine
    container_name: forge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: forge:local
    container_name: forge-api
    ports:
      # Host:container — both default to 8000. Override with FORGE_PORT in
      # a top-level .env (read by compose) to expose a different port.
      - "${FORGE_PORT:-8000}:${FORGE_PORT:-8000}"
    environment:
      FORGE_APP_NAME: ${FORGE_APP_NAME:-Forge}
      FORGE_ENVIRONMENT: ${FORGE_ENVIRONMENT:-dev}
      FORGE_LOG__LEVEL: ${FORGE_LOG__LEVEL:-DEBUG}
      FORGE_HOST: ${FORGE_HOST:-0.0.0.0}
      FORGE_PORT: ${FORGE_PORT:-8000}
      FORGE_RELOAD: ${FORGE_RELOAD:-true}
      FORGE_DATABASE__HOST: postgres
      FORGE_DATABASE__PORT: 5432
      FORGE_DATABASE__NAME: forge
      FORGE_DATABASE__USER: forge
      FORGE_DATABASE__PASSWORD: forge
      FORGE_DATABASE__SSL_MODE: disable
      FORGE_CELERY__BROKER_URL: ${FORGE_CELERY__BROKER_URL:-redis://redis:6379/0}
      # The api never materializes workspaces, but the settings class requires
      # these fields. Empty defaults are fine because the api code path doesn't
      # touch them — keeps env parity with worker.
      FORGE_TERRAFORM__MANAGED_RESOURCES_BUCKET: ${FORGE_TERRAFORM__MANAGED_RESOURCES_BUCKET:-forge-local-managed-resources}
      FORGE_TERRAFORM__MANAGED_RESOURCES_REGION: ${FORGE_TERRAFORM__MANAGED_RESOURCES_REGION:-us-east-1}
      FORGE_TERRAFORM__PACKAGES_DIR: /app/packages
    volumes:
      - ./src:/app/src:ro
      - ./packages:/app/packages:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, urllib.request; urllib.request.urlopen('http://localhost:' + os.environ.get('FORGE_PORT', '8000') + '/livez').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker:
    # Same image as api; only the entrypoint differs. Keeps Python deps,
    # config loading, and (later) the terraform binary in lockstep.
    build:
      context: .
      dockerfile: Dockerfile
    image: forge:local
    container_name: forge-worker
    command:
      [
        "celery",
        "-A",
        "forge.workers",
        "worker",
        "--loglevel=info",
        "--concurrency=2",
        "-Q",
        "provisioning",
      ]
    environment:
      FORGE_APP_NAME: ${FORGE_APP_NAME:-Forge}
      FORGE_ENVIRONMENT: ${FORGE_ENVIRONMENT:-dev}
      FORGE_LOG__LEVEL: ${FORGE_LOG__LEVEL:-DEBUG}
      FORGE_DATABASE__HOST: postgres
      FORGE_DATABASE__PORT: 5432
      FORGE_DATABASE__NAME: forge
      FORGE_DATABASE__USER: forge
      FORGE_DATABASE__PASSWORD: forge
      FORGE_DATABASE__SSL_MODE: disable
      FORGE_CELERY__BROKER_URL: ${FORGE_CELERY__BROKER_URL:-redis://redis:6379/0}
      FORGE_TERRAFORM__MANAGED_RESOURCES_BUCKET: ${FORGE_TERRAFORM__MANAGED_RESOURCES_BUCKET:-forge-local-managed-resources}
      FORGE_TERRAFORM__MANAGED_RESOURCES_REGION: ${FORGE_TERRAFORM__MANAGED_RESOURCES_REGION:-us-east-1}
      FORGE_TERRAFORM__PACKAGES_DIR: /app/packages
      # Default to the deterministic fake terraform so `docker compose up`
      # works without AWS credentials. The integration test suite relies on
      # this default; a developer who wants to drive a real apply against
      # an AWS account overrides via FORGE_TERRAFORM__BINARY=terraform in
      # a top-level .env (and supplies AWS_* credentials separately).
      FORGE_TERRAFORM__BINARY: ${FORGE_TERRAFORM__BINARY:-python /app/tests/_fake_terraform/fake_terraform.py}
      # AWS credentials — passed through from the host .env when set. The
      # default `:-` keeps the var present-but-empty so terraform's AWS
      # provider just falls back to the next link in the credential chain.
      # See docs/runbooks/real-aws-provisioning.md and .env.example for the
      # two supported recipes (profile + ~/.aws mount, or static keys).
      AWS_PROFILE: ${AWS_PROFILE:-}
      AWS_REGION: ${AWS_REGION:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./src:/app/src:ro
      - ./packages:/app/packages:ro
      # The fake terraform script lives under tests/ — mount read-only into
      # the worker so the FORGE_TERRAFORM__BINARY default above resolves.
      - ./tests/_fake_terraform:/app/tests/_fake_terraform:ro
      # Uncomment for AWS_PROFILE auth (option (a) in .env.example). Read-only
      # mount of the host SSO / credentials cache. Not needed for static-key
      # auth (option b) or for the default fake-terraform path.
      # - ~/.aws:/root/.aws:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "celery", "-A", "forge.workers", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:
