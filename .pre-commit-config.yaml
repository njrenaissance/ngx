repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint (with fixes)
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy (type check, informational)
        entry: bash -c 'uv run mypy src/ || true'
        language: system
        pass_filenames: false
        verbose: true

      - id: pytest-unit
        name: pytest (unit tests)
        entry: uv run pytest -m unit --no-header -q
        language: system
        pass_filenames: false
        stages: [pre-push]
