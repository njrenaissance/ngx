repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff lint (with fixes)
        entry: uv run ruff check --fix
        language: system
        types: [python]

      - id: ruff-format
        name: ruff format
        entry: uv run ruff format
        language: system
        types: [python]

      - id: mypy
        name: mypy (type check, informational)
        entry: bash -c 'uv run mypy src/ || true'
        language: system
        pass_filenames: false
        verbose: true

      - id: pytest-unit
        name: pytest (unit tests)
        entry: uv run pytest -m unit --no-header -q
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Module-level Terraform contract tests. Same set of tests CI runs in
      # the `Plan` job (one entry per module that ships a tests/ directory).
      # Pre-push so it doesn't slow every commit. Catches version-evaluator
      # drift between local Terraform and CI's pinned 1.10.0 — the test
      # works on local 1.15 but a list-literal eager-evaluation difference
      # in 1.10 broke a `contains()` assertion in PR #21.
      - id: terraform-test-ecr
        name: terraform test — ecr module
        entry: bash -c 'cd infrastructure/modules/ecr && terraform init -backend=false -input=false -upgrade > /dev/null && terraform test -no-color'
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^infrastructure/modules/ecr/

      - id: terraform-test-kms
        name: terraform test — kms module
        entry: bash -c 'cd infrastructure/modules/kms && terraform init -backend=false -input=false -upgrade > /dev/null && terraform test -no-color'
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^infrastructure/modules/kms/

      # Format check (no auto-fix in CI, so apply same gate locally).
      - id: terraform-fmt
        name: terraform fmt -check
        entry: bash -c 'terraform fmt -check -recursive infrastructure/'
        language: system
        pass_filenames: false
        stages: [pre-push]
        files: ^infrastructure/.*\.tf$
